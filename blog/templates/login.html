{% extends "base.html" %}
{% block title %}Log in — Blog{% endblock %}
{% block content %}
<div class="auth-form">
  <h1>Log in</h1>
  {% if error %}
    <ul class="form-errors">
      <li>{{ error }}</li>
    </ul>
  {% endif %}
  <form method="post" action="{{ url_for('auth.login', next=next) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="next" value="{{ next }}">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-primary">Log in</button>
  </form>
  <p class="form-hint"><a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a></p>
  <p class="form-hint">No account? <a href="{{ url_for('auth.signup') }}">Sign up</a></p>
</div>
{% endblock %}
