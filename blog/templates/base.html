<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Blog{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="{{ url_for('static', filename='theme.js') }}" defer></script>
  {% block scripts %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="{{ url_for('posts.index') }}" class="logo">Blog</a>
      <nav class="nav-links">
        <a href="{{ url_for('posts.index') }}">Home</a>
        <a href="{{ url_for('search.search') }}">Search</a>
        {% if current_user %}
          <a href="{{ url_for('posts.new_post') }}">New Post</a>
          <span class="nav-user">{{ current_user }}</span>
          <form method="post" action="{{ url_for('auth.logout') }}" class="logout-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button type="submit" class="btn btn-ghost">Log out</button>
          </form>
        {% else %}
          <a href="{{ url_for('auth.login') }}">Log in</a>
          <a href="{{ url_for('auth.signup') }}" class="btn btn-primary">Sign up</a>
        {% endif %}
      </nav>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">🌓</button>
    </div>
  </header>

  <main class="container main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>A simple personal blog — share your thoughts.</p>
    </div>
  </footer>
</body>
</html>
