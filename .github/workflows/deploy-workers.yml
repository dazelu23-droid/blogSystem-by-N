name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - "blog-workers/**"
      - "workout-blog.html"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blog-workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: blog-workers/package-lock.json

      - name: Sync workout blog static file
        run: cp ../workout-blog.html public/workout-blog.html

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 schema
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute simple-blog-db --remote --file=schema.sql -y
        continue-on-error: true

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
